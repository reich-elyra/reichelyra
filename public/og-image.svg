<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d778"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07c2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#030712"/>

  <!-- Subtle border -->
  <rect x="40" y="40" width="1120" height="550" rx="8" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>

  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="url(#goldGradient)" letter-spacing="8">REICH ELYRA</text>

  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="300" fill="#9ca3af" letter-spacing="4">AI | LegalTech | Investment</text>

  <!-- Decorative line -->
  <line x1="450" y1="390" x2="750" y2="390" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>

  <!-- Domain -->
  <text x="600" y="550" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#6b7280" letter-spacing="2">reichelyra.com</text>
</svg>
